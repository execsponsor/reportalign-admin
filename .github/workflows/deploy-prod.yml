name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/frontend"
          api_location: "/api"
          output_location: "dist"
        env:
          VITE_ENTRA_CLIENT_ID: c303da83-4258-45fa-a7fc-8edd00e87c1f
          VITE_ENTRA_TENANT_ID: 968f235a-c65e-4e4c-b308-9dd27c1b5a30
          VITE_ENTRA_AUTHORITY: https://login.microsoftonline.com/968f235a-c65e-4e4c-b308-9dd27c1b5a30
          NODE_VERSION: '22'
